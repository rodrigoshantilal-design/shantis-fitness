<!DOCTYPE html>
<!-- Declaração do tipo de documento HTML5 -->
<html lang="en">
<!-- Elemento raiz; lang="en" define inglês como idioma da página -->
<head>
    <!-- Secção de metadados: não visível diretamente no ecrã -->
    <meta charset="UTF-8">
    <!-- Codificação UTF-8 para suportar caracteres especiais e acentuados -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Configuração de viewport para que a página seja responsiva em dispositivos móveis -->
    <title>Login - Shanti's Fitness And Wellness</title>
    <!-- Título que aparece na aba do navegador -->
    <link rel="stylesheet" href="css/styles.css">
    <!-- Liga a folha de estilos CSS partilhada por todas as páginas da aplicação -->
</head>
<body>
<!-- Corpo da página - contém toda a estrutura visível da página de login -->

    <!-- Contentor principal que ocupa o ecrã inteiro com fundo preto -->
    <div class="min-h-screen w-full bg-black">

        <!-- Decorações de fundo (Background decorations) -->
        <!-- Gradiente suave em roxo/violeta no canto superior esquerdo, apenas visual, não interativo -->
        <div class="fixed" style="inset: 0; background: linear-gradient(to bottom right, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.05), transparent); pointer-events: none;"></div>
        <!-- Padrão de grelha subtil sobreposto ao fundo, cria um efeito de quadriculado discreto -->
        <div class="fixed" style="inset: 0; background: repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0px, transparent 1px, transparent 64px), repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0px, transparent 1px, transparent 64px); pointer-events: none;"></div>

        <!-- Botão "Voltar" fixo no canto superior esquerdo -->
        <!-- Redireciona o utilizador de volta à página inicial (index.html) -->
        <a href="index.html" class="fixed top-8 left-8 flex items-center gap-2 text-gray-400 z-10" style="transition: color 0.2s;">
            <!-- Ícone de seta para a esquerda (SVG) -->
            <svg class="icon-md" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            <span class="text-sm">Back to home</span>
        </a>

        <!-- Conteúdo Centrado na Página -->
        <!-- Usa flexbox para centrar o cartão de login vertical e horizontalmente -->
        <div class="min-h-screen w-full flex items-center justify-center p-6">
            <div class="w-full max-w-md">
                <!-- Cartão de Login -->
                <!-- Caixa com fundo escuro (#111111), bordas arredondadas e sombra profunda -->
                <div class="rounded-2xl p-8 shadow-2xl" style="background: #111111; border: 1px solid rgba(255,255,255,0.1);">

                    <!-- Logótipo da Aplicação -->
                    <!-- Ícone com gradiente roxo e nome da marca, funcionam como cabeçalho do cartão -->
                    <div class="flex items-center justify-center gap-3 mb-8">
                        <!-- Ícone com fundo em gradiente roxo -->
                        <div class="p-2 bg-gradient-purple rounded-xl">
                            <!-- Ícone SVG de halteres/fitness em branco -->
                            <svg style="width: 24px; height: 24px; color: white;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6.5 6.5 11 11"></path><path d="m21 21-1-1"></path><path d="m3 3 1 1"></path><path d="m18 22 4-4"></path><path d="m2 6 4-4"></path><path d="m3 10 7-7"></path><path d="m14 21 7-7"></path></svg>
                        </div>
                        <!-- Nome da marca: "Shanti's" em branco e "Fitness & Wellness" em gradiente roxo-rosa -->
                        <h1 style="font-size: 18px; font-weight: 800;">
                            <span style="color: white;">Shanti's</span> <span style="background: linear-gradient(135deg, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">Fitness & Wellness</span>
                        </h1>
                    </div>

                    <!-- Cabeçalho do Formulário -->
                    <!-- Mensagem de boas-vindas e texto de encorajamento -->
                    <div class="text-center mb-8">
                        <h2 class="text-2xl font-bold text-white mb-2">Welcome back</h2>
                        <p class="text-gray-400">Continue your fitness journey</p>
                    </div>

                    <!-- Formulário de Login -->
                    <!-- id="loginForm" é usado pelo JavaScript para capturar o evento de submissão -->
                    <form id="loginForm" class="space-y-5">

                        <!-- Caixa de Mensagem de Erro -->
                        <!-- Inicialmente escondida (classe "hidden"); torna-se visível se o login falhar -->
                        <!-- Mostra mensagens de erro como "email ou senha inválidos" -->
                        <div id="errorMessage" class="hidden p-4 rounded-xl" style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2);">
                            <!-- Texto do erro, preenchido dinamicamente pelo JavaScript -->
                            <p class="text-sm text-red-400" id="errorText"></p>
                        </div>

                        <!-- Campo de Email -->
                        <!-- Campo obrigatório para o utilizador introduzir o seu endereço de email -->
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">Email</label>
                            <div class="relative">
                                <!-- Ícone de envelope posicionado à esquerda dentro do campo (SVG) -->
                                <svg class="absolute icon-md text-gray-500" style="left: 1rem; top: 50%; transform: translateY(-50%);" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"></rect><path d="m2 7 10 8 10-8"></path></svg>
                                <!-- Campo de texto do tipo "email" - valida formato de email automaticamente -->
                                <!-- required: campo obrigatório; placeholder: texto de ajuda -->
                                <input type="email" id="email" required placeholder="you@example.com" style="padding-left: 3rem;">
                            </div>
                        </div>

                        <!-- Campo de Palavra-passe -->
                        <!-- Campo obrigatório para o utilizador introduzir a sua senha -->
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                            <div class="relative">
                                <!-- Ícone de cadeado posicionado à esquerda dentro do campo (SVG) -->
                                <svg class="absolute icon-md text-gray-500" style="left: 1rem; top: 50%; transform: translateY(-50%);" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                                <!-- Campo do tipo "password" - oculta o texto digitado com asteriscos -->
                                <input type="password" id="password" required placeholder="Enter your password" style="padding-left: 3rem;">
                            </div>
                        </div>

                        <!-- Botão de Submissão do Formulário -->
                        <!-- Ao clicar, dispara o evento "submit" no formulário, capturado pelo JavaScript -->
                        <!-- id="submitBtn" permite ao JS desativar o botão durante o processo de login -->
                        <button type="submit" class="btn btn-primary w-full" id="submitBtn">
                            <!-- Ícone de entrada/login (SVG) -->
                            <svg class="icon-md" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
                            <!-- Texto do botão; pode ser alterado pelo JS para "Signing in..." durante o carregamento -->
                            <span id="submitText">Sign In</span>
                        </button>
                    </form>

                    <!-- Rodapé do Cartão: Link para Registo -->
                    <!-- Separador visual e link para a página de criação de conta -->
                    <div class="mt-6 pt-6 text-center" style="border-top: 1px solid rgba(255,255,255,0.1);">
                        <p class="text-sm text-gray-400">
                            Don't have an account?
                            <!-- Link para signup.html - redireciona para a página de registo -->
                            <a href="signup.html" class="text-indigo-400 font-medium" style="transition: color 0.2s;">Create one</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Script de Módulo JavaScript para Autenticação -->
    <!-- type="module" permite usar a sintaxe "import" para importar funções de outros ficheiros -->
    <script type="module">
        // Importa a função loginUser do módulo de armazenamento/autenticação
        import { loginUser } from './js/storage.js';

        // Obtém referências aos elementos do DOM que serão manipulados
        const form = document.getElementById('loginForm');         // O formulário inteiro
        const errorDiv = document.getElementById('errorMessage'); // Caixa de erro
        const errorText = document.getElementById('errorText');   // Texto dentro da caixa de erro
        const submitBtn = document.getElementById('submitBtn');   // Botão de submissão
        const submitText = document.getElementById('submitText'); // Texto dentro do botão

        // Adiciona um ouvinte ao evento "submit" do formulário
        // A função async permite usar "await" para operações assíncronas (como chamadas à base de dados)
        form.addEventListener('submit', async (e) => {
            // Impede o comportamento padrão do formulário (que seria recarregar a página)
            e.preventDefault();

            // Lê os valores introduzidos pelo utilizador nos campos de email e password
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Esconde qualquer mensagem de erro anterior
            errorDiv.classList.add('hidden');

            // Desativa o botão para evitar cliques múltiplos e altera o texto para feedback visual
            submitBtn.disabled = true;
            submitText.textContent = 'Signing in...';

            try {
                // Tenta autenticar o utilizador com as credenciais fornecidas
                // loginUser é uma função assíncrona que comunica com o backend/base de dados
                await loginUser(email, password);
                // Se o login for bem-sucedido, redireciona para o painel principal
                window.location.href = 'dashboard.html';
            } catch (error) {
                // Se o login falhar (email ou senha incorretos, erro de rede, etc.)
                // Mostra a mensagem de erro no div de erro
                errorText.textContent = error.message || 'Invalid email or password';
                errorDiv.classList.remove('hidden');
                // Reativa o botão e restaura o texto original para o utilizador tentar novamente
                submitBtn.disabled = false;
                submitText.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
