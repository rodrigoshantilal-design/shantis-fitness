<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Shanti's Fitness And Wellness</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="min-h-screen w-full bg-black">
        <!-- Background decorations -->
        <div class="fixed" style="inset: 0; background: linear-gradient(to bottom right, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.05), transparent); pointer-events: none;"></div>
        <div class="fixed" style="inset: 0; background: repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0px, transparent 1px, transparent 64px), repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0px, transparent 1px, transparent 64px); pointer-events: none;"></div>

        <!-- Back button -->
        <a href="index.html" class="fixed top-8 left-8 flex items-center gap-2 text-gray-400 z-10" style="transition: color 0.2s;">
            <svg class="icon-md" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            <span class="text-sm">Back to home</span>
        </a>

        <!-- Centered content -->
        <div class="min-h-screen w-full flex items-center justify-center p-6">
            <div class="w-full max-w-md">
                <div class="rounded-2xl p-8 shadow-2xl" style="background: #111111; border: 1px solid rgba(255,255,255,0.1);">
                    <!-- Logo -->
                    <div class="flex items-center justify-center gap-3 mb-8">
                        <div class="p-2 bg-gradient-purple rounded-xl">
                            <svg style="width: 24px; height: 24px; color: white;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6.5 6.5 11 11"></path><path d="m21 21-1-1"></path><path d="m3 3 1 1"></path><path d="m18 22 4-4"></path><path d="m2 6 4-4"></path><path d="m3 10 7-7"></path><path d="m14 21 7-7"></path></svg>
                        </div>
                        <h1 style="font-size: 18px; font-weight: 800;">
                            <span style="color: white;">Shanti's</span> <span style="background: linear-gradient(135deg, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">Fitness & Wellness</span>
                        </h1>
                    </div>

                    <div class="text-center mb-8">
                        <h2 class="text-2xl font-bold text-white mb-2">Welcome back</h2>
                        <p class="text-gray-400">Continue your fitness journey</p>
                    </div>

                    <form id="loginForm" class="space-y-5">
                        <!-- Error message -->
                        <div id="errorMessage" class="hidden p-4 rounded-xl" style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2);">
                            <p class="text-sm text-red-400" id="errorText"></p>
                        </div>

                        <!-- Email -->
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">Email</label>
                            <div class="relative">
                                <svg class="absolute icon-md text-gray-500" style="left: 1rem; top: 50%; transform: translateY(-50%);" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"></rect><path d="m2 7 10 8 10-8"></path></svg>
                                <input type="email" id="email" required placeholder="you@example.com" style="padding-left: 3rem;">
                            </div>
                        </div>

                        <!-- Password -->
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                            <div class="relative">
                                <svg class="absolute icon-md text-gray-500" style="left: 1rem; top: 50%; transform: translateY(-50%);" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                                <input type="password" id="password" required placeholder="Enter your password" style="padding-left: 3rem;">
                            </div>
                        </div>

                        <!-- Submit button -->
                        <button type="submit" class="btn btn-primary w-full" id="submitBtn">
                            <svg class="icon-md" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
                            <span id="submitText">Sign In</span>
                        </button>
                    </form>

                    <div class="mt-6 pt-6 text-center" style="border-top: 1px solid rgba(255,255,255,0.1);">
                        <p class="text-sm text-gray-400">
                            Don't have an account?
                            <a href="signup.html" class="text-indigo-400 font-medium" style="transition: color 0.2s;">Create one</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { loginUser } from './js/storage.js';

        const form = document.getElementById('loginForm');
        const errorDiv = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const submitBtn = document.getElementById('submitBtn');
        const submitText = document.getElementById('submitText');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Hide previous errors
            errorDiv.classList.add('hidden');

            // Disable button
            submitBtn.disabled = true;
            submitText.textContent = 'Signing in...';

            try {
                await loginUser(email, password);
                window.location.href = 'dashboard.html';
            } catch (error) {
                errorText.textContent = error.message || 'Invalid email or password';
                errorDiv.classList.remove('hidden');
                submitBtn.disabled = false;
                submitText.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
