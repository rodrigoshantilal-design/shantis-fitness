<!DOCTYPE html>
<!-- Página do Coach com Inteligência Artificial: permite ao utilizador conversar com um assistente virtual de fitness -->
<html lang="en">
<head>
    <!-- Definição do conjunto de caracteres como UTF-8 para suportar caracteres especiais -->
    <meta charset="UTF-8">
    <!-- Configuração para que a página seja responsiva em dispositivos móveis -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Título da aba do browser -->
    <title>AI Coach - Shanti's Fitness And Wellness</title>
    <!-- Ligação ao ficheiro de estilos principal do projeto -->
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Contentor principal do coach: ocupa a altura do ecrã menos o navbar, disposição em coluna */
        .coach-container {
            height: calc(100vh - 6rem);
            display: flex;
            flex-direction: column;
            max-width: 64rem;
            margin: 0 auto;
            padding: 1.5rem;
        }
        /* Cabeçalho do coach: centrado */
        .coach-header {
            text-align: center;
            margin-bottom: 1rem;
        }
        /* Wrapper do ícone do coach: disposição em linha com o título */
        .coach-icon-wrapper {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
        /* Ícone circular decorativo com efeito de vidro fosco (glassmorphism) */
        .coach-icon {
            width: 2.5rem;
            height: 2.5rem;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }
        /* Título principal da página do coach */
        .coach-title {
            font-size: 1.875rem;
            font-weight: 900;
            color: white;
        }
        /* Subtítulo descritivo do coach */
        .coach-subtitle {
            color: #9ca3af;
            font-size: 0.875rem;
        }
        /* Contentor do chat: ocupa o espaço restante, estilo glassmorphism */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1rem;
            overflow: hidden;
        }
        /* Área de mensagens: com scroll vertical para histórico de conversação */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        /* Estado vazio: exibido quando não há mensagens no chat */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        /* Ícone de estado vazio */
        .empty-icon {
            width: 4rem;
            height: 4rem;
            color: #374151;
            margin-bottom: 1rem;
        }
        /* Texto de estado vazio */
        .empty-text {
            color: #9ca3af;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        /* Grelha de sugestões de perguntas: 2 colunas */
        .suggestions-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
            max-width: 32rem;
        }
        /* Botão de sugestão: clicável, com efeito hover */
        .suggestion-btn {
            padding: 0.75rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0.5rem;
            color: #d1d5db;
            font-size: 0.75rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s;
        }
        .suggestion-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        /* Balão de mensagem: largura máxima de 80% do ecrã */
        .message {
            display: flex;
            max-width: 80%;
        }
        /* Mensagem do utilizador: alinhada à direita */
        .message-user {
            align-self: flex-end;
        }
        /* Mensagem do assistente: alinhada à esquerda */
        .message-assistant {
            align-self: flex-start;
        }
        /* Interior do balão de mensagem */
        .message-bubble {
            padding: 1rem;
            border-radius: 0.75rem;
        }
        /* Estilo do balão para mensagens do utilizador */
        .message-user .message-bubble {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        /* Estilo do balão para mensagens do assistente */
        .message-assistant .message-bubble {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }
        /* Conteúdo textual da mensagem: preserva quebras de linha */
        .message-content {
            font-size: 0.875rem;
            white-space: pre-wrap;
            line-height: 1.5;
        }
        /* Hora da mensagem: pequena e semitransparente */
        .message-time {
            font-size: 0.75rem;
            margin-top: 0.5rem;
            opacity: 0.6;
        }
        /* Contentor da caixa de texto de entrada */
        .input-container {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 1rem;
        }
        /* Linha de entrada: campo de texto + botões lado a lado */
        .input-row {
            display: flex;
            gap: 0.75rem;
        }
        /* Campo de texto do chat */
        .chat-input {
            flex: 1;
            padding: 0.75rem 1rem;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0.75rem;
            color: white;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.3s;
        }
        /* Campo de texto em foco: borda roxa */
        .chat-input:focus {
            border-color: #9333ea;
        }
        /* Placeholder do campo de texto */
        .chat-input::placeholder {
            color: #6b7280;
        }
        /* Campo desativado durante o carregamento da resposta */
        .chat-input:disabled {
            opacity: 0.5;
        }
        /* Botão de envio de mensagem */
        .btn-send {
            padding: 0.75rem 1.5rem;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(12px);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-send:hover:not(:disabled) {
            background: rgba(255,255,255,0.25);
        }
        /* Botão desativado durante envio */
        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        /* Botão de limpar histórico: estilo vermelho */
        .btn-clear {
            padding: 0.75rem 1rem;
            background: rgba(220,38,38,0.1);
            border: 1px solid rgba(220,38,38,0.3);
            color: #f87171;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-clear:hover {
            background: rgba(220,38,38,0.2);
        }
        /* Spinner de carregamento: animação de rotação */
        .loading-spinner {
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        /* Animação de rotação do spinner */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        /* Utilitário para esconder elementos */
        .hidden { display: none !important; }

        /* Responsividade para ecrãs pequenos: sugestões numa coluna e mensagens mais largas */
        @media (max-width: 640px) {
            .suggestions-grid {
                grid-template-columns: 1fr;
            }
            .message {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <!-- Botão de login fixo no canto superior esquerdo, visível em todas as páginas -->

    <!-- Barra de navegação principal do site -->

    </nav>
    <script src="js/mobile-nav.js"></script>

    <!-- Conteúdo principal da página -->
    <main class="main-content" style="padding-top: 6rem;">
        <div class="coach-container">
            <!-- Cabeçalho da secção do coach com ícone e título -->
            <div class="coach-header">

            <div class="chat-container">
                <!-- Contentor de mensagens com scroll -->
                <div class="messages-container" id="messagesContainer">
                    <!-- Estado vazio: mostrado quando não há mensagens; escondido quando o chat tem histórico -->
                    <div class="empty-state" id="emptyState">
                        <!-- Ícone de balão de conversa SVG -->
                        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                        </svg>
                        <!-- Texto de convite para o utilizador interagir -->
                        <p class="empty-text" data-i18n="askAnything">Ask me anything about your fitness plan!</p>
                        <!-- Grelha de sugestões de perguntas rápidas; preenchida dinamicamente pelo JavaScript -->
                        <div class="suggestions-grid" id="suggestionsGrid">

                    </div>
                </div>

                <!-- Área de entrada de texto e botões de envio/limpeza -->
                <div class="input-container">

                            class="chat-input"

                        <button class="btn-send" id="sendBtn" onclick="handleSend()">

                plateau: [
                    "Superar um plateau requer estratégia:\n\n**Mudanças no Treino**:\n• Aumenta o peso em 2.5-5%\n• Adiciona uma série extra por exercício\n• Muda a ordem dos exercícios\n• Experimenta diferentes faixas de repetição\n\n**Ajustes na Nutrição**:\n• Recalcula o teu TDEE (podes precisar de mais/menos calorias)\n• Aumenta a proteína ligeiramente\n• Considera uma pausa na dieta (1-2 semanas em manutenção)\n\n**Foco na Recuperação**:\n• Estás a dormir o suficiente?\n• Gere os níveis de stress\n• Faz uma semana de deload se necessário",
                    "Os plateaus são normais! Experimenta estas estratégias:\n\n1. **Semana de Deload**: Reduz o peso em 40-50% durante uma semana\n2. **Muda o Esquema de Reps**: Se fazes 8-12, experimenta 5-8 ou 12-15\n3. **Novos Exercícios**: Troca alguns exercícios por variações\n4. **Verifica a Recuperação**: Sono, stress e nutrição são importantes\n5. **Sê Paciente**: O progresso nem sempre é linear"
                ],
                // Respostas gerais em português
                general: [
                    "Aqui está um conselho geral baseado no teu plano de fitness:\n\n**Consistência é a Chave**:\n• Segue o teu plano durante pelo menos 8-12 semanas\n• Pequenos progressos acumulam ao longo do tempo\n• Não saltes treinos a menos que seja necessário\n\n**Regista Tudo**:\n• Anota os teus treinos\n• Regista a tua alimentação (pelo menos inicialmente)\n• Tira fotos de progresso mensalmente\n\n**Ouve o Teu Corpo**:\n• Descansa quando realmente precisares\n• Não treines com dor\n• Ajusta a intensidade com base nos teus níveis de energia",
                    "Dicas para o sucesso na tua jornada fitness:\n\n1. **Começa onde estás**: Não te compares aos outros\n2. **Foca em hábitos**: Faz do fitness parte da tua rotina\n3. **Celebra pequenas vitórias**: Cada treino conta\n4. **Aprende à medida que avances**: O fitness é uma jornada para toda a vida\n5. **Sê flexível**: A vida acontece, adapta-te e continua"
                ]
            }
        };

        // Idioma atual: lido do localStorage, ou inglês por defeito
        let currentLanguage = localStorage.getItem('locale') || 'en';
        // Array que guarda o histórico de mensagens do chat
        let messages = [];
        // Variável de estado que indica se uma resposta está a ser carregada
        let loading = false;

        // Inicialização da página quando o DOM está completamente carregado
        document.addEventListener('DOMContentLoaded', function() {
            // Carrega o histórico de mensagens do localStorage
            loadMessages();
            // Aplica as traduções ao idioma atual
            updateLanguage();
            // Renderiza as sugestões de perguntas
            renderSuggestions();
            // Renderiza as mensagens guardadas
            renderMessages();

            // Listener para enviar mensagem ao pressionar Enter
            document.getElementById('chatInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    handleSend();
                }
            });
        });

        // Carrega o histórico de mensagens guardado no localStorage
        function loadMessages() {
            const stored = localStorage.getItem('chatHistory');
            if (stored) {
                messages = JSON.parse(stored);
            }
        }

        // Guarda o array de mensagens atual no localStorage
        function saveMessages() {
            localStorage.setItem('chatHistory', JSON.stringify(messages));
        }

        // Renderiza os botões de sugestão com base no idioma atual
        function renderSuggestions() {
            const container = document.getElementById('suggestionsGrid');
            const t = translations[currentLanguage];

            // Cria um botão para cada sugestão de pergunta
            container.innerHTML = t.suggestions.map(suggestion => `
                <button class="suggestion-btn" onclick="useSuggestion('${suggestion.replace(/'/g, "\\'")}')">
                    ${suggestion}
                </button>
            `).join('');
        }

        // Renderiza todas as mensagens do array no ecrã
        function renderMessages() {
            const container = document.getElementById('messagesContainer');
            const emptyState = document.getElementById('emptyState');
            const clearBtn = document.getElementById('clearBtn');

            // Se não há mensagens, mostra o estado vazio e esconde o botão de limpar
            if (messages.length === 0) {
                if (emptyState) emptyState.classList.remove('hidden');
                if (clearBtn) clearBtn.classList.add('hidden');
                return;
            }

            // Se há mensagens, esconde o estado vazio e mostra o botão de limpar
            if (emptyState) emptyState.classList.add('hidden');
            if (clearBtn) clearBtn.classList.remove('hidden');

            // Remove apenas os balões de mensagem, preservando o emptyState
            Array.from(container.children).forEach(child => {
                if (!child.classList.contains('empty-state')) child.remove();
            });

            // Cria e adiciona um elemento HTML para cada mensagem
            messages.forEach(msg => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message message-${msg.role}`;

                // Formata a hora da mensagem de acordo com o idioma
                const time = new Date(msg.timestamp).toLocaleTimeString(
                    currentLanguage === 'pt' ? 'pt-BR' : 'en-US',
                    { hour: '2-digit', minute: '2-digit' }
                );

                // Escapa HTML, converte markdown negrito (**texto**) em <strong> e quebras de linha
                messageDiv.innerHTML = `
                    <div class="message-bubble">
                        <div class="message-content">${escapeHtml(msg.content).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>')}</div>
                        <div class="message-time">${time}</div>
                    </div>
                `;

                container.appendChild(messageDiv);
            });

            // Faz scroll automático até à última mensagem
            container.scrollTop = container.scrollHeight;
        }

        // Função utilitária para escapar caracteres HTML e prevenir XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Preenche o campo de texto com a sugestão e envia automaticamente
        window.useSuggestion = function(text) {
            document.getElementById('chatInput').value = text;
            handleSend();
        };

        // Função principal de envio de mensagem (assíncrona para comunicar com a API)
        window.handleSend = async function() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            const t = translations[currentLanguage];

            // Não envia se o campo estiver vazio ou se já estiver a carregar
            if (!message || loading) return;

            // Cria e adiciona a mensagem do utilizador ao array
            const userMessage = {
                role: 'user',
                content: message,
                timestamp: new Date().toISOString()
            };
            messages.push(userMessage);
            saveMessages();
            renderMessages();

            // Limpa o campo de texto e ativa o estado de carregamento
            input.value = '';
            loading = true;
            updateSendButton();

            try {
                // Lê o plano de fitness do utilizador do localStorage para enviar contexto ao coach
                const plan = JSON.parse(localStorage.getItem('fitnessPlan') || 'null');
                // Faz chamada à API do servidor para obter resposta do coach
                const res = await fetch('/api/coach', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, plan, language: currentLanguage })
                });
                const data = await res.json();
                // Adiciona a resposta do assistente ao array de mensagens
                const assistantMessage = {
                    role: 'assistant',
                    content: data.reply || 'Sorry, I could not get a response.',
                    timestamp: new Date().toISOString()
                };
                messages.push(assistantMessage);
                saveMessages();
            } catch (e) {
                // Em caso de erro de rede, exibe mensagem de erro genérica
                messages.push({ role: 'assistant', content: 'Something went wrong. Please try again.', timestamp: new Date().toISOString() });
            }

            // Desativa o estado de carregamento e atualiza o ecrã
            loading = false;
            updateSendButton();
            renderMessages();
        };

        // Gera uma resposta local com base no tema detectado na mensagem do utilizador
        // Esta função é usada como fallback (não chamada diretamente no fluxo principal)
        function generateResponse(userMessage) {
            const lang = currentLanguage;
            const responses = coachResponses[lang];
            const lowerMessage = userMessage.toLowerCase();

            // Deteta o tema da mensagem por palavras-chave em inglês e português
            let topic = 'general';

            if (lowerMessage.includes('workout') || lowerMessage.includes('treino') ||
                lowerMessage.includes('exercise') || lowerMessage.includes('exercício') ||
                lowerMessage.includes('routine') || lowerMessage.includes('rotina') ||
                lowerMessage.includes('improve') || lowerMessage.includes('melhorar')) {
                topic = 'workout';
            } else if (lowerMessage.includes('protein') || lowerMessage.includes('proteína') ||
                       lowerMessage.includes('eating') || lowerMessage.includes('comendo') ||
                       lowerMessage.includes('nutrition') || lowerMessage.includes('nutrição') ||
                       lowerMessage.includes('food') || lowerMessage.includes('comida')) {
                topic = 'protein';
            } else if (lowerMessage.includes('rest') || lowerMessage.includes('descanso') ||
                       lowerMessage.includes('recovery') || lowerMessage.includes('recuperação') ||
                       lowerMessage.includes('off day') || lowerMessage.includes('dia de folga')) {
                topic = 'rest';
            } else if (lowerMessage.includes('plateau') || lowerMessage.includes('platô') ||
                       lowerMessage.includes('stuck') || lowerMessage.includes('preso') ||
                       lowerMessage.includes('not progressing') || lowerMessage.includes('não progredindo') ||
                       lowerMessage.includes('break through') || lowerMessage.includes('ultrapassar')) {
                topic = 'plateau';
            }

            // Escolhe aleatoriamente uma das respostas disponíveis para o tema
            const topicResponses = responses[topic];
            const randomIndex = Math.floor(Math.random() * topicResponses.length);
            return topicResponses[randomIndex];
        }

        // Atualiza o visual do botão de envio conforme o estado de carregamento
        function updateSendButton() {
            const btn = document.getElementById('sendBtn');
            const icon = document.getElementById('sendIcon');

            if (loading) {
                // Desativa o botão e mostra o spinner de animação
                btn.disabled = true;
                icon.innerHTML = '<circle cx="12" cy="12" r="10" stroke-dasharray="31.4" stroke-dashoffset="31.4"><animate attributeName="stroke-dashoffset" values="31.4;0" dur="1s" repeatCount="indefinite"/></circle>';
                icon.classList.add('loading-spinner');
            } else {
                // Reativa o botão e restaura o ícone de envio
                btn.disabled = false;
                icon.innerHTML = '<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>';
                icon.classList.remove('loading-spinner');
            }
        }

        // Limpa todo o histórico do chat após confirmação do utilizador
        window.handleClear = function() {
            const t = translations[currentLanguage];
            if (confirm(t.clearConfirm)) {
                messages = [];
                // Remove o histórico do localStorage
                localStorage.removeItem('chatHistory');
                renderMessages();
                renderSuggestions();
            }
        };

        // Mostra/esconde o dropdown de seleção de idioma
        function toggleLanguageDropdown() {
            const dropdown = document.getElementById('languageDropdown');
            dropdown.classList.toggle('hidden');
        }

        // Muda o idioma da aplicação e atualiza todos os textos
        function setLanguage(lang) {
            currentLanguage = lang;
            // Guarda a preferência de idioma no localStorage
            localStorage.setItem('locale', lang);
            updateLanguage();
            renderSuggestions();
            renderMessages();
            // Fecha o dropdown após selecionar o idioma
            document.getElementById('languageDropdown').classList.add('hidden');
        }

        // Atualiza todos os textos traduzíveis da página com o idioma atual
        function updateLanguage() {
            // Atualiza o texto da bandeira/idioma no botão
            document.getElementById('currentLang').textContent = currentLanguage.toUpperCase();
            const t = translations[currentLanguage];

            // Atualiza todos os elementos com atributo data-i18n
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) {
                    el.textContent = t[key];
                }
            });

            // Atualiza o placeholder do campo de texto
            const input = document.getElementById('chatInput');
            if (input) {
                input.placeholder = t.placeholder;
            }

            // Traduz os links de navegação
            const NAV = {
                en: { Dashboard: 'Dashboard', Plan: 'Plan', Track: 'Track', Meals: 'Meals', Progress: 'Progress', Coach: 'Coach' },
                pt: { Dashboard: 'Dashboard', Plan: 'Plano', Track: 'Registo', Meals: 'Refeições', Progress: 'Progresso', Coach: 'Coach' }
            };
            const navT = NAV[currentLanguage] || NAV.en;
            document.querySelectorAll('.nav-links a[data-nav]').forEach(function(a) {
                const key = a.getAttribute('data-nav');
                if (navT[key] !== undefined) a.textContent = navT[key];
            });
        }

        // Fecha o dropdown de idioma quando se clica fora dele
        document.addEventListener('click', function(e) {
            const selector = document.getElementById('languageSelector');
            if (!selector.contains(e.target)) {
                document.getElementById('languageDropdown').classList.add('hidden');
            }
        });
    </script>
    <!-- Script responsável pela barra de progresso de peso no topo da página -->
    <script src="/js/weight-progress-bar.js"></script>
    <!-- Script de autenticação e gestão do estado do navbar (login/logout) -->
    <script src="/js/auth-nav.js"></script>
</body>
