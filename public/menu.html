<!DOCTYPE html>
<!-- Página de Menu: página simples de redireccionamento para a secção de Refeições -->
<html lang="en">
<head>
    <!-- Codificação de caracteres UTF-8 -->
    <meta charset="UTF-8">
    <!-- Viewport responsivo para dispositivos móveis -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Título da aba do browser -->
    <title>Menu - Shanti's Fitness And Wellness</title>
    <!-- Folha de estilos principal do projeto (inclui glass-effect, btn-primary, etc.) -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Ecrã centrado que ocupa toda a altura da janela -->
    <div class="min-h-screen flex items-center justify-center px-6">
        <!-- Cartão central com efeito de vidro fosco (glassmorphism) -->
        <div class="text-center glass-effect rounded-2xl p-8 max-w-md">
            <!-- Título da página em branco e negrito -->
            <h1 class="text-3xl font-black text-white mb-4">Menu</h1>
            <!-- Texto descritivo em cinzento que informa o utilizador sobre a funcionalidade -->
            <p class="text-gray-400 mb-6">Check out the Meals page for nutrition tracking.</p>
            <!-- Botão de acção primário que redireciona o utilizador para a página de Refeições -->
            <a href="meals.html" class="btn btn-primary">Go to Meals</a>
        </div>
    </div>
    <!-- Script da barra de progresso de peso (carrega a barra de progresso global) -->
    <script src="/js/weight-progress-bar.js"></script>
</body>
</html>
