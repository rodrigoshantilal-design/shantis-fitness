<!DOCTYPE html>
<!-- Página de Verificação Diária: página simples de redireccionamento para a secção de Acompanhamento (Track) -->
<html lang="en">
<head>
    <!-- Codificação de caracteres UTF-8 -->
    <meta charset="UTF-8">
    <!-- Viewport responsivo para dispositivos móveis -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Título da aba do browser -->
    <title>Daily Check - Shanti's Fitness And Wellness</title>
    <!-- Folha de estilos principal do projeto (inclui glass-effect, btn-primary, etc.) -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Ecrã centrado que ocupa toda a altura da janela -->
    <div class="min-h-screen flex items-center justify-center px-6">
        <!-- Cartão central com efeito de vidro fosco (glassmorphism) -->
        <div class="text-center glass-effect rounded-2xl p-8 max-w-md">
            <!-- Título da página em branco e negrito -->
            <h1 class="text-3xl font-black text-white mb-4">Daily Check</h1>
            <!-- Texto descritivo em cinzento que informa o utilizador sobre a funcionalidade -->
            <p class="text-gray-400 mb-6">Use the Track page to log your daily progress.</p>
            <!-- Botão de acção primário que redireciona o utilizador para a página de Acompanhamento (track.html) -->
            <a href="track.html" class="btn btn-primary">Go to Track</a>
        </div>
    </div>
</body>
</html>
